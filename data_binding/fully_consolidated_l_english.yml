 ### From: DB_buildings_l_english.yml
building_type_db_tomb_ancestors_01:0 "Tomb of Ancestors"
building_type_db_tomb_ancestors_01_desc:0 "#F Building a Tomb of Ancestors can unite tribes and raise the authority of tribal chiefs.#!"
building_db_tomb_ancestors_01:0 "Tomb of Ancestors"
