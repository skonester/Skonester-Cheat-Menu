 ### From: pcm_decisions_l_english.yml
 pcm_money_decision_title:0 "#Skonester:#! Treasure of the Realm"
 pcm_money_decision_desc:0 "Call forth an immense treasury, and be granted a bounty of gold, piety, and renown."
 pcm_money_decision_tooltip:0 "Gain a great hoard of gold, piety, and prestige, to begin your reign with strength."
 pcm_money_decision_ct:0 "The coffers of kings overflow before me!"
 pcm_subrealm_to_culture_decision_title:0 "#Skonester:#! Edict of Culture"
 pcm_subrealm_to_culture_decision_desc:0 "Proclaim an edict that all vassals and lands adopt the culture of their liege."
 pcm_subrealm_to_culture_decision_tooltip:0 "Unite your realm under one culture."
 pcm_subrealm_to_culture_decision_ct:0 "Henceforth, the realm shall speak with one tongue and custom."
 pcm_convert_subrealm_to_religion_decision_title:0 "#Skonester:#! Edict of Faith"
 pcm_convert_subrealm_to_religion_decision_desc:0 "Proclaim an edict that your vassals and sub-realm be converted to your faith."
 pcm_convert_subrealm_to_religion_decision_tooltip:0 "Unite your realm under one holy banner."
 pcm_convert_subrealm_to_religion_decision_ct:0 "Let the light of truth fall upon the wayward!"
 pcm_show_decision_title:0 "--= #Skonester:#! Reveal the Hidden Edicts =--"
 pcm_show_decision_desc:0 "Reveal all Skonester decrees."
 pcm_show_decision_tooltip:0 ""
 pcm_show_decision_ct:0 "So let it be written, so let it be known."
 pcm_hide_decision_title:0 "--= #Skonester:#! Conceal the Edicts =--"
 pcm_hide_decision_desc:0 "Conceal the Skonester decrees from view."
 pcm_hide_decision_tooltip:0 ""
 pcm_hide_decision_ct:0 "Seal the parchments and hush the tongues."
 pcm_cure_pox_decision_title:0 "#Skonester:#! Purging of Afflictions"
 pcm_cure_pox_decision_desc:0 "By decree, all carnal maladies and common ailments shall be banished from the realm."
 pcm_cure_pox_decision_tooltip:0 "Cleanse the realm of afflictions borne of the flesh."
 pcm_cure_pox_decision_ct:0 "The healer’s herbs and holy oils restore me to purity!"
 pcm_cure_all_decision_title:0 "#Skonester:#! Panacea of the Realm"
 pcm_cure_all_decision_desc:0 "A wondrous elixir is proclaimed, healing all manner of disease across the land."
 pcm_cure_all_decision_tooltip:0 "Cure all ailments and plagues throughout the realm."
 pcm_cure_all_decision_ct:0 "Rejoice! The shadow of sickness lifts from our people."
 pcm_cure_inbred_decision_title:0 "#Skonester:#! Purification of Bloodlines"
 pcm_cure_inbred_decision_desc:0 "Through mystic rites and divine favor, the stains in your realm are cleansed."
 pcm_cure_inbred_decision_tooltip:0 "Remove all ill humors and defects from realm."
 pcm_cure_inbred_decision_ct:0 "The blood of my land flows pure and strong once more!"

 ### From: pcm_main_l_english.yml
 set_immortal_interaction:0 "Bestow Immortality"
 set_immortal_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall be granted eternal life, with visage forever preserved at five-and-twenty winters."
 set_mortal_interaction:0 "Revoke Immortality"
 set_mortal_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall be released from the chains of endless life. Perhaps [recipient.GetSheHe] longs for the rest of the grave."
 set_super_interaction:0 "Anoint as Paragon"
 set_super_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall be exalted far beyond mortals: unmatched in wisdom, strength, fertility, vigor, renown, wealth, and dread. Truly a paragon among lords."
 set_unsuper_interaction:0 "Rescind Paragon’s Blessings"
 set_unsuper_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall be stripped of all exalted gifts. [recipient.GetSheHe|U] may find this burden most grievous."
 set_super_governor_interaction:0 "Bestow Steward’s Mandate"
 set_super_governor_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall be granted mastery in the governance of realms: greater levies, wise stewardship, swift building of halls, flourishing prosperity, and the favor of the commons."
 set_unsuper_governor_interaction:0 "Rescind Steward’s Mandate"
 set_unsuper_governor_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall lose these blessings of governance, returning to mortal limitation."
 set_super_general_interaction:0 "Bless as Warlord"
 set_super_general_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall become an unrivaled commander of hosts: unmatched in valor, martial prowess, stratagem, and endurance; feared in battle and swift in siege."
 set_unsuper_general_interaction:0 "Rescind Warlord’s Blessing"
 set_unsuper_general_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall be stripped of all divine favor in war, and may falter where once [recipient.GetSheHe] triumphed."
 set_all_in_one_interaction:0 "Crown as Exemplar"
 set_all_in_one_interaction_desc:0 "For [recipient.GetShortUINameNoTooltip|U], all blessings are granted: Paragon, Steward’s Mandate, and Warlord’s Bane, united within one form. Truly a wonder of Skonester’s mysteries."
 set_unall_in_one_interaction:0 "Return to Mortal Station"
 set_unall_in_one_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] shall lose all gifts of paragon, steward, and warlord, and walk again as a child of men."

 ### From: pcm_traits_l_english.yml
 trait_immortality:0 "Immortal"
 trait_immortality_desc:0 "This character has partaken of the Sacred Gift of Immortality. Their visage shall remain ever youthful, and they are proof against the grasp of natural death."
 trait_immortality_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has been blessed with the Sacred Gift of Immortality. [ROOT.GetCharacter.GetSheHe|U] shall never age beyond five-and-twenty years, nor yield to natural death itself."
 trait_super:0 "Paragon"
 trait_super_desc:0 "This character is a paragon among mortals, bearing unmatched attributes, vigor, charm, and skills that place [ROOT.GetCharacter.GetHerHim] above all others."
 trait_super_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has been exalted as a paragon, gifted with boundless strength, wit, and renown."
 trait_super_governor:0 "Steward of Wonders"
 trait_super_governor_desc:0 "This character governs with near-divine wisdom. Their lands prosper, towns flourish, and order reigns supreme, as though touched by heaven’s hand."
 trait_super_governor_character_desc:0 "Under [ROOT.GetCharacter.GetFirstNameNoTooltip]’s rule, the realm thrives, fields blossom, and even the lowliest peasant blesses their steward’s name."
 trait_super_general:0 "Warlord Anointed"
 trait_super_general_desc:0 "This character leads armies as though guided by the hand of destiny itself. Their hosts fight with unshakable valor and achieve victory after victory."
 trait_super_general_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] commands with unmatched genius, feared by enemies and revered by soldiers, leading every host to triumph."

