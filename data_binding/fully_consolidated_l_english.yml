trait_blood_ancester_6:0 "Dark Night"
trait_blood_ancester_6_desc:0 "This character traces their lineage to a legendary knight blessed by the Lord of Night. The blood flowing in their veins carries ancestral power: the omnipresence of shadow."
trait_blood_ancester_6_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] traces their lineage to a legendary knight blessed by the Lord of Night. The blood flowing in their veins echoes the power of that ancestor."
trait_blood_ancester_8:0 "Venus"
trait_blood_ancester_8_desc:0 "This character traces their lineage to a legendary knight who watched for light in the dark and stood firm against despair. The blood flowing in their veins carries ancestral power: hope amidst ruin."
trait_blood_ancester_8_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] traces their lineage to a legendary knight who watched for light in the dark. The blood flowing in their veins echoes the power of that ancestor."
trait_blood_ancester_9:0 "Jester"
trait_blood_ancester_9_desc:0 "This character traces their lineage to a legendary knight who was fooled by the world yet made it his mission to bring smiles. The blood flowing in their veins carries ancestral power: the ridicule of love."
trait_blood_ancester_9_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] traces their lineage to a legendary knight who was fooled by the world yet chose to smile. The blood flowing in their veins echoes the power of that ancestor."
trait_blood_ancester_10:0 "Raven"
trait_blood_ancester_10_desc:0 "This character traces their lineage to a legendary knight who prayed to the bird of wisdom to foresee death. The blood flowing in their veins carries ancestral power: wisdom through calamity."
trait_blood_ancester_10_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] traces their lineage to a legendary knight who prayed to the bird of wisdom. The blood flowing in their veins echoes the power of that ancestor."
trait_blood_ancester_11:0 "Silver Dragon"
trait_blood_ancester_11_desc:0 "This character traces their lineage to a legendary knight who committed a taboo against the Great Silver Dragon. The blood flowing in their veins carries ancestral power: the dragon's breath."
trait_blood_ancester_11_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] traces their lineage to a legendary knight who committed a taboo against the Great Silver Dragon. The blood flowing in their veins echoes the power of that ancestor."
trait_blood_art_1:0 "Taiji"
trait_blood_art_1_desc:0 "Since birth, this character has been deeply influenced by their grandfather, learning a great physical technique from the Far East through observation and practice: Taiji."
trait_blood_art_1_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] has been deeply influenced by their grandfather since birth, learning a great physical technique from the Far East: Taiji."
trait_blood_knight_1:0 "Knight Squire"
