trait_blood_ancester_5:0 "Wild Boar"
trait_blood_ancester_5_desc:0 "This character traces their lineage to a legendary knight who possessed the spirit of the Wild Boar. The blood flowing in their veins carries ancestral power: rampage and destruction."
