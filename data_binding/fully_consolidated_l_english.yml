building_db_tomb_ancestors_02:0 "Tomb of Legendary Ancestors"
building_db_tomb_ancestors_02_desc:0 "Building a Tomb of Legendary Ancestors would be a good way to unite the tribe and raise its reputation."
building_type_db_hall_pillage_01:0 "Hall of Pillager"
building_type_db_hall_pillage_01_desc:0 "#F It's a place where the Pillagers of our tribe prepare for pillaging. Here they share looting, rearrange their weapons, and prepare for the next pillage.#!"
