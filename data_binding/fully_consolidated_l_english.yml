trait_blood_ancester_1:0 "Feline Grace"
trait_blood_ancester_1_desc:0 "This character traces their lineage to a legendary knight who formed a pact with a Great Feline. The blood flowing in their veins carries the ancestral power of the beast: the elegance of the cat."
trait_blood_ancester_1_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] traces their lineage to a legendary knight who formed a pact with a Great Feline. The blood flowing in their veins echoes the power of that ancestor."
trait_blood_ancester_2:0 "Loyal Hound"
trait_blood_ancester_2_desc:0 "This character traces their lineage to a legendary knight who bonded with the great Hachiko. The blood flowing in their veins carries the ancestral power of the beast: the undying loyalty of the dog."
