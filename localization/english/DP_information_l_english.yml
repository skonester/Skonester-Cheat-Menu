  dp_information.useful_tips.t:0 "Useful Tips"
  dp_information.useful_tips.d:0 "Feature Menu\n- Click once to add, click again to remove.\n- If a feature doesn’t appear, it doesn’t mean the mod is broken; it can indicate a hardcoded override from Paradox or that AGOT,etc.overode a base game factor.This is why some decisions don't work.\n- Due to DLC factors, some interactions may not appear on certain characters.\n- Test this mod with only base game/DLC.Then with say a 1066 character like Duchess Matilda to see if this mod is causing your isses. Some older mods that havent been updated can be the real issue."
  dp_information.locations.t:0 "This is goodbye"
  dp_information.locations.d:0 "\n- This is likely the last update to this mod. I don't have the motivation to build upon it further.I have done everything I wanted to do in this game. To be quite frank, I no longer prefer to engage in free bug testing in regards to what Paradox implements with this game. They are a business first and make a great core. Thankful to everyone for the support.The creative drive is just now gone.I hope you had fun enjoying it as I really did making it.Much love Skone. 
  
