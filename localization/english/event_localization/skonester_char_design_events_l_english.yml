 sarc_char_design.dyn.choice.event.t:1 "Dynasty Choice"
 sarc_char_design.dyn.choice.event.d:0 " Choose between killing your dynasty members or just adding the disinherited trait to some of them.\n\n These are done to make sure your character inherits the ruler's titles.\n\n Killing them gives the feeling of having a near empty dynasty to work up from, while disheriting some leaves the dynasty largely intact.\n\n I suggest the disherit option for multiplayer, lest the dynasty clearing hit other players."

