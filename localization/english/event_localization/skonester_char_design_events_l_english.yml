 sarc_char_design.1001.t:1 "Character Designer Prompt"
 sarc_char_design.1001.desc.5:0 "Do you want to design a custom ruler? (WARNING: Kills off your immediate dynasty or disinherits them and your current ruler dies once you complete creation.) (After selecting your character's age, your character is created with 5 in all skills. This created character is assigned as your current ruler's son.)"
