l_russian:
  daddy_pika_information:0 "Золотая информация чит-меню Skonester"
  information_desc:0 "Делайте форки и добавляйте изменения на Github, я, скорее всего, объединю их с основной веткой, если в моде возникнут критические ошибки при запуске игры."
  information_TT:0 "Нажмите, чтобы просмотреть подробную информацию об этом моде."
  
  dp_information.changelog.t:0 "Предфинальный"
  dp_information.changelog.d:0 "Gold : 1.19.0.5"
  dp_information.useful_tips.t:0 "Полезные советы"
  dp_information.useful_tips.d:0 "Меню функций\n- Нажмите один раз, чтобы добавить, нажмите еще раз, чтобы удалить.\n- Если функция не появляется, это не значит, что мод сломан; это может указывать на жестко закодированную перезапись от Paradox или на то, что AGOT и т.д. перезаписали базовый игровой фактор. Вот почему некоторые решения не работают.\n- Из-за факторов DLC некоторые взаимодействия могут не появляться у определенных персонажей.\n- Протестируйте этот мод только с базовой игрой и этим модом, активным, например, за герцогиню Матильду, чтобы увидеть, вызывает ли этот мод ваши проблемы."
  dp_information.locations.t:0 "С большой любовью к сообществу"
  dp_information.locations.d:0 "\n- Вероятно, это одно из моих последних обновлений для этого мода. У меня больше нет мотивации развивать его дальше, так как я сделал в этой игре всё, что хотел, и даже больше. Честно говоря, я просто не хочу быть долгосрочным бесплатным тестером ошибок на милости Paradox и того, что они захотят сделать со своей игрой в будущем. Я понимаю, что они прежде всего бизнес и создают отличный основной опыт для миллионов. Тем не менее, я благодарен всем, кто поддерживал то, чем этот мод был на самом деле «под поверхностью». Любому здравомыслящему человеку нужно двигаться к другим начинаниям, когда творческий драйв пропадает. Мы все через это проходили. Надеюсь, вам было весело пользоваться им, так же как мне было весело его создавать. С любовью, Skone. "
  
  use_new_system:0 "Новая система"
  use_new_system_desc:0 "Старая система была заменена на новую. Хотите попробовать её?"
  use_new_system_tooltip:0 "Нажатие на это вызовет событие."