 sarc_char_design.dyn.choice.event.t:1 "Выбор династии"
 sarc_char_design.dyn.choice.event.d:0 "Выберите между убийством членов вашей династии или просто добавлением лишенных наследства черт к некоторым из них. \ n \ n Это сделано для того, чтобы ваш персонаж унаследовал титулы правителя. \ n \ n Их убийство дает ощущение, что у вас есть почти пустая династия, из которой можно вырасти, в то время как лишение наследства некоторых оставляет династию в значительной степени нетронутой. \ N \ n Я предлагаю вариант лишения наследства для многопользовательской игры, чтобы очищение династии не поразило других игроков ."

