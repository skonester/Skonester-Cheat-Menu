 sarc_char_design.1001.t:1 "Подсказка дизайнера персонажей"
 sarc_char_design.1001.desc.5:0 "Хотите создать собственную линейку? (ПРЕДУПРЕЖДЕНИЕ:убивает вашу непосредственную династию или лишает ее наследства, и ваш текущий правитель умирает, как только вы завершите создание.) (После выбора возраста вашего персонажа ваш персонаж будет создан со всеми навыками 5. Этот созданный персонаж назначается сыном вашего нынешнего правителя.) "
 sarc_char_design.1001.desc.10:0 "Хотите создать собственную линейку? (ПРЕДУПРЕЖДЕНИЕ:убивает вашу непосредственную династию или лишает ее наследства, и ваш текущий правитель умирает, как только вы завершите создание.) (После выбора возраста вашего персонажа ваш персонаж будет создан со всеми навыками 10. Этот созданный персонаж назначается сыном вашего нынешнего правителя.) "
 
