 sarc_char_design.skill.event.t:1 "Навыки"
 sarc_char_design.skill.event.d.5:0 "Выберите навык, чтобы изменить его значение. Все навыки пользовательского персонажа начинаются с 5. Изменения навыков отображаются только по прошествии дня, но вы можете навести указатель мыши на счет статистики на экране персонажа для точная сумма ".
 sarc_char_design.skill.event.d.10:0 "Выберите навык, чтобы изменить его значение. Все навыки пользовательского персонажа начинаются с 10. Изменения навыков отображаются только по прошествии дня, но вы можете навести указатель мыши на счет статистики на экране персонажа для точная сумма ".
 
