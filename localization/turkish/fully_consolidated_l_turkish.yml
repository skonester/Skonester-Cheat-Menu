 pcm_b_max_all_buildings_sub_realm_decision_title:0 "#Skonester Kararnameleri:#! Tüm Varlıkları Tam İhtişamına Yükselt"
 pcm_b_max_all_buildings_sub_realm_decision_desc:0 "Her salonun, kalenin ve holdingin en yüksek güce ve ihtişama yükseltilmesini emredin."
 pcm_b_max_all_buildings_sub_realm_decision_tooltip:0 ""
 pcm_b_max_all_buildings_sub_realm_decision_ct:0 "Tüm taş ve ahşap işlerini mükemmelleştirmek için duvar ustalarını, marangozları ve demircileri çağırın."
 pcm_b_add_building_slot_7_sub_realm_decision_title:0 "#Skonester Kararnameleri:#! İnşaat İçin Yeni Zemin Verme"
 pcm_b_add_building_slot_7_sub_realm_decision_desc:0 "Alanlarınızın her biri, içlerinde yedi güçlü yapı ayakta kalıncaya kadar boş alanla kutsanacak."
 pcm_b_add_building_slot_7_sub_realm_decision_tooltip:0 ""
 pcm_b_add_building_slot_7_sub_realm_decision_ct:0 "Sahip olduğum her ülkede yeni barakalar, salonlar ve kuleler yükselsin!"
 pcm_b_lucky_7_sub_realm_decision_title:0 "#Skonester Kararnameler:#! Kutsal Yedi Eser"
 pcm_b_lucky_7_sub_realm_decision_desc:0 "Tüm varlıklarınız, en yüksek biçimine yükseltilmiş her değerli yapıyı alacaktır. (Özel ve düklük yapıları dahil değildir). Binaları yükseltmek için önceden yeni zemin sağlamakıllıca#! olacaktır."
 pcm_b_lucky_7_sub_realm_decision_tooltip:0 ""
 pcm_b_lucky_7_sub_realm_decision_ct:0 "Tüm eserlerin sanki ilahi takdir tarafından yönlendiriliyormuş gibi aceleyle inşa edilmesine izin verin!"
 pcm_b_show_decision_title:0 "--=#Skonester:#! Gnostik Zanaatı Ortaya Çıkarın =--"
 pcm_b_show_decision_desc:0 "Yapı yükseltme sanatıyla ilgili tüm Skonester fermanlarını açıklayın."
 pcm_b_show_decision_tooltip:0 ""
 pcm_b_show_decision_ct:0 "Öyle olsun; gizli hükümlerin bilinmesine izin verin."
 pcm_b_hide_decision_title:0 "--=#Skonester:#! Gnostik Zanaatı Gizleyin =--"
 pcm_b_hide_decision_desc:0 "İnşaat sanatlarıyla ilgili Skonester kararlarını gizleyin."
 pcm_b_hide_decision_tooltip:0 ""
 pcm_b_hide_decision_ct:0 "Tomarları mühürleyin ve bilgiyi başıboş gözlerden uzak tutun."
