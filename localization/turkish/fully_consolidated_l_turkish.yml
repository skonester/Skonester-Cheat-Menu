 building_type_db_tribal_assembly_01:0 "Kabile Meclisi"
 building_type_db_tribal_assembly_01_desc:0 "#F Kabile için önemli çalışmalara karar verecek bir Meclis. Meclis'te yaklaşan savaş, inanç vb. konularda tartışmalar yapılacak.#!"
 building_db_tribal_assembly_01:0 "Kabile Meclisi"
 building_db_tribal_assembly_01_desc:0 "Kabile için önemli çalışmalara karar verecek bir Meclis. Mecliste yaklaşan savaş, inanç vb. konular tartışılacak."
 building_db_tribal_assembly_02:0 "Genişletilmiş Kabile Meclisi"
 building_db_tribal_assembly_02_desc:0 "Kabile önemli bir şeye karar verdiğinde toplantı düzenlemek çok yorucu oluyor. Şefin yanında Şaman gibi yetenekli savaşçılardan oluşan bir danışma grubu varsa Şef, yaklaşan sorunlarla zamanla başa çıkabilecektir."
 building_type_db_shura_council_01:0 "Şura Konseyi"
 building_type_db_shura_council_01_desc:0 "#F Şura, 'istişare' anlamına gelen Arapça bir kelimedir. İlk İslam topluluklarında önemli kararlar almadan önce karşılıklı istişareyi teşvik etmek için kullanılır.#!"
 building_db_shura_council_01:0 "Kalıcı Olmayan Şura Konseyi"
 building_db_shura_council_01_desc:0 "Şura Konseyi kuruldu. Kalıcı olmasa da, Sultan gerektiğinde politika tavsiyesi alabilecektir."
 building_db_shura_council_02:0 "Daimi Şura Konseyi"
 building_db_shura_council_02_desc:0 "Sultan, Şura Meclisini yeniden düzenleyerek her zaman uygun tavsiyeler alabildi."
 building_db_shura_council_03:0 "Genişletilmiş Şura Konseyi"
 building_db_shura_council_03_desc:0 "Sultan, Şura Meclisini genişleterek daha fazla alanda profesyonel tavsiye alma olanağına kavuştu."
 building_type_db_royal_mosque_01:0 "Kraliyet Camii"
 building_type_db_royal_mosque_01_desc:0 "#F Kraliyet ailesinin ibadet etmek için ziyaret ettiği bir cami.#!"
 building_db_royal_mosque_01:0 "Kraliyet Camii"
 building_db_royal_mosque_01_desc:0 "$building_type_db_royal_mosque_01_desc$"
 building_db_royal_mosque_02:0 "Kraliyet Medresesi"
 building_db_royal_mosque_02_desc:0 "Medrese, ilahiyat dahil çeşitli ilimlerin öğretilmesi amacıyla Mescid-i Haram'ın altına inşa edildi."
 building_db_royal_mosque_03:0 "Kraliyet Mahzeni"
 building_db_royal_mosque_03_desc:0 "Kraliyet Camii'nin altına, kraliyet ailesinin üyelerinin huzur içinde dinlenmesine olanak tanıyan bir Mezar inşa edildi."
 building_type_db_royal_chapel_01:0 "Kraliyet Şapeli"
 building_type_db_royal_chapel_01_desc:0 "#F Kraliyet ailesinin ibadet etmek için ziyaret ettiği bir Şapel.#!"
 building_db_royal_chapel_01:0 "Kraliyet Şapeli"
 building_db_royal_chapel_01_desc:0 "$building_type_db_royal_chapel_01_desc$"
 building_db_royal_chapel_02:0 "Genişletilmiş Kraliyet Şapeli"
 building_db_royal_chapel_02_desc:0 "Kraliyet Şapeli genişletilerek öğrencilerin teoloji gibi alanlarda eğitim alabilmeleri için çeşitli eğitim tesisleri genişletildi."
 building_db_royal_chapel_03:0 "Kraliyet Mahzeni"
 building_db_royal_chapel_03_desc:0 "Kraliyet Şapeli'nin altına, kraliyet ailesinin üyelerinin huzur içinde dinlenmesine olanak tanıyan bir Mezar inşa edildi."
 building_type_db_insular_monas_01:0 "Ada Manastırı"
 building_type_db_insular_monas_01_desc:0 "#F Tipik bir Batı kilisesinde, kilise organizasyonunun temel birimi piskoposluktur, ancak İrlanda öyle değildi. İrlanda'da kiliseler, her kabilenin kabile reisleri tarafından kurulan ve kabile reislerinin soyundan gelenler tarafından kontrol edilen manastırlara dayalı olarak örgütleniyordu. Bu manastırlar, sıradan ortaçağ manastırları gibi büyük taş binalar değil, küçük bir kiliseyi çevreleyen sazdan çatılı evlerden oluşan bir gruptu.#!"
 building_db_insular_monas_01:0 "Ada Manastırı"
 building_db_insular_monas_01_desc:0 "$building_type_db_insular_monas_01_desc$"
 building_db_insular_monas_02:0 "Genişletilmiş Ada Manastırı"
 building_db_insular_monas_02_desc:0 "Manastır, yerel kabile reisinin yatırımıyla genişledi. Burada her zamankinden daha fazla keşiş son derece dindar bir hayat yaşayacak ve tutkuyla öğrenmeye çalışacak."
 building_type_db_local_parliament_01:0 "Yerel Parlamento"
 building_type_db_local_parliament_01_desc:0 "#F Yerel Parlamento, Hükümdarların yönetişim konusunda tavsiye aldığı veya halkın rızasını aldığı bir yerdir.#!"
 building_db_local_parliament_01:0 "Kalıcı Olmayan Yerel Parlamento"
 building_db_local_parliament_01_desc:0 "Yerel Meclis kuruldu. Kalıcı olmasa da, Hükümdar gerektiğinde politikaya danışabilecektir."
 building_db_local_parliament_02:0 "Daimi Yerel Parlamento"
 building_db_local_parliament_02_desc:0 "Yerel Parlamentoyu yeniden düzenleyerek Hükümdar her zaman uygun tavsiyeler alabildi"
 building_db_local_parliament_03:0 "Genişletilmiş Yerel Parlamento"
 building_db_local_parliament_03_desc:0 "Hükümdar, Yerel Parlamentoyu genişleterek daha fazla alanda profesyonel tavsiye alabildi"
 building_type_db_local_library_01:0 "Kütüphane"
 building_type_db_local_library_01_desc:0 "#F Pek çok çeşit kitabın saklandığı bir yer.#!"
 building_db_local_library_01:0 "Küçük Kütüphane"
 building_db_local_library_01_desc:0 "Küçük bir kütüphane. Kitap sayısı az olmasına rağmen kitaplardan öğrenmek isteyenler geliyor."
 building_db_local_library_02:0 "Ünlü Yerel Kütüphane"
 building_db_local_library_02_desc:0 "Yerel yöneticilerin yatırımları sayesinde kitapları genişletmeyi ve kitap kopyalamak için yazıcılar tutmayı başardık."
 building_db_local_library_03:0 "Büyük Kütüphane"
 building_db_local_library_03_desc:0 "Pek çok kitabın bulunduğu bir kütüphane. Uzaklardan pek çok insan buraya öğrenmek için geliyor."
 building_type_db_artificial_forest_01:0 "Yapay Orman"
 building_type_db_artificial_forest_01_desc:0 "#F Bölgemizde orman bulunmamasından dolayı, komşu bölgelerden ağaç satın alıyoruz. Ormanların yapay olarak yaratılması yalnızca bu israfı azaltmakla kalmayacak, aynı zamanda inşaat, gemi yapımı ve okçuluk için istikrarlı bir hammadde tedarikini de mümkün kılacaktır.#!"
 building_db_artificial_forest_01:0 "Küçük Yapay Orman"
 building_db_artificial_forest_01_desc:0 "Yapay olarak küçük ormanlar oluşturmak için ağaçlar diktik."
 building_db_artificial_forest_02:0 "Orman Bekçisi Atanması"
 building_db_artificial_forest_02_desc:0 "Yapay olarak oluşturulan ormanları yönetmek için bir orman bekçisi görevlendiriyoruz."
 building_db_artificial_forest_03:0 "Büyük Yapay Orman"
 building_db_artificial_forest_03_desc:0 "Yapay olarak bir orman yaratma planımız başarıya ulaştı. Artık ormanları kullanarak eğitim alabiliyoruz ve inşaat, gemi yapımı, yay yapımı vb. için kolayca hammadde elde edebiliyoruz."
 building_type_db_caravan_sarai_01:0 "Kervansaray"
 building_type_db_caravan_sarai_01_desc:0 "#F Kervansaray, yolcuların dinlenebileceği ve günlük yolculuktan sonra toparlanabileceği, yol kenarındaki bir handır. Kervansaraylar, başta İpek Yolu olmak üzere Asya, Kuzey Afrika ve Güneydoğu Avrupa'yı kapsayan ticaret yolları ağı boyunca ticaret, bilgi ve insan akışını destekliyordu.#!"
 building_db_caravan_sarai_01:0 "Karavan Sarayı"
 building_db_caravan_sarai_01_desc:0 "$building_type_db_caravan_sarai_01_desc$"
 building_db_caravan_sarai_02:0 "Karavan Sarayı"
 building_db_caravan_sarai_02_desc:0 "$building_type_db_caravan_sarai_01_desc$"
 building_db_caravan_sarai_03:0 "Karavan Sarayı"
 building_db_caravan_sarai_03_desc:0 "$building_type_db_caravan_sarai_01_desc$"
 building_type_db_prison_cell_01:0 "Hapishane Kulesi"
 building_type_db_prison_cell_01_desc:0 "#F Mahkumlara 'düzgün' davranılabilecek bir yer.#!"
 building_db_prison_cell_01:0 "Genişletilmiş Hapishane"
 building_db_prison_cell_01_desc:0 "Cezaevlerinin genişletilmesi mahkumlar için hayatın daha acı verici olmasına yardımcı olacaktır."
 building_db_prison_cell_02:0 "İnfaz Alanı"
 building_db_prison_cell_02_desc:0 "Acı dolu bir hayata bir an önce son vermek daha iyi olmaz mıydı?"
 building_db_prison_cell_03:0 "Güçlendirilmiş Hapishane Kulesi"
 building_db_prison_cell_03_desc:0 "Hapishane kulesinin güçlendirilmesi, düşman saldırısı nedeniyle güvenliğin bozulmasını önleyecektir."
 building_type_db_court_justice_01:0 "Adalet Divanı"
 building_type_db_court_justice_01_desc:0 "#F Kanunlara göre günahın varlığını yargıladığınız ve günahkarı cezalandırdığınız yerdir.#!"
 building_db_court_justice_01:0 "Yüz Mahkeme"
 building_db_court_justice_01_desc:0 "Yüzlercesinde mahkemeler sabit bir yerde yapılıyordu; diğerlerinde ise mahkemeler her oturumda farklı bir yere taşındı. Yüz mahkemenin asıl görevi, açık borç sisteminin sürdürülmesiydi. Mahkeme on iki mülk sahibinden veya özgür adamdan oluşuyordu."
 building_db_court_justice_02:0 "Shire Mahkemesi"
 building_db_court_justice_02_desc:0 "Shire mahkemesi, yerel düzeyde yasa ve düzeni sağlamak ve merkezi hükümet için vergilerin toplanması da dahil olmak üzere çeşitli idari işlevleri yerine getirmek için kullanılan yasal bir kurumdu."
 building_db_court_justice_03:0 "King's Bench Mahkemesi"
 building_db_court_justice_03_desc:0 "King's Bench Mahkemesi bir ortak hukuk mahkemesiydi. 12. yüzyılın sonlarında ve 13. yüzyılın başlarında Curia Regis'ten oluşturulan Kral Tezgahı, başlangıçta hükümdarı seyahatlerinde takip etti. King's Bench nihayet 1318'de Westminster Hall'daki Common Pleas Mahkemesi ve Pleas Maliyesi'ne katıldı ve son seyahatlerini 1421'de yaptı."
 building_type_db_statue_horse_01:0 "At Heykeli"
 building_type_db_statue_horse_01_desc:0 "#F 'Glitterhoof' isimli efsanevi atın onuruna yapılan bir heykeldir.#!"
 building_db_statue_horse_01:0 "At Heykeli"
 building_db_statue_horse_01_desc:0 "$building_type_db_statue_horse_01_desc$"
 building_db_statue_horse_02:0 "Altın Kaplama"
 building_db_statue_horse_02_desc:0 "'Glitterhoof' heykeline altın kaplamak ona biraz daha fazla saygı göstermenin iyi bir yolu olabilir."
 building_db_statue_horse_03:0 "Ek Hayvan Heykelleri"
 building_db_statue_horse_03_desc:0 "'Glitterhoof' heykelinin yanına küçük bir hayvan heykeli de eklerseniz şekli daha mükemmel olacaktır."
 building_type_db_kurultai_01:0 "Kurultay"
 building_type_db_kurultai_01_desc:0 "#F Kurultai, eski Moğol ve Türk şefleri ve hanlarından oluşan siyasi ve askeri bir konseydi. Moğol İmparatorluğu'nun tüm Büyük Hanları, örneğin Cengiz Han ve Ögedei Han, bir Kurultai'de resmen seçildi; Altın Orda gibi bağlı Moğol devletlerinin hanları da benzer bir bölgesel Kurultai tarafından seçiliyordu.#!"
 building_db_kurultai_01:0 "Kurultay"
 building_db_kurultai_01_desc:0 "Kurultay yapıldı. Kalıcı olmasa da Han gerektiğinde politikaya danışabilecektir."
 building_db_kurultai_02:0 "Daimi Kurultay"
 building_db_kurultai_02_desc:0 "Han, Kurultay'ı yeniden düzenleyerek her zaman uygun tavsiyeler alabildi."
 building_db_kurultai_03:0 "Genişletilmiş Kurultai"
 building_db_kurultai_03_desc:0 "Han, Kurultay'ı genişleterek daha fazla alanda profesyonel tavsiye alabildi."
 building_type_db_lighthouse_01:0 "Deniz feneri"
 building_type_db_lighthouse_01_desc:0 "#F Geceleri seyreden gemilerin güvenliğini garanti eden uzun bir kuledir.#!"
 building_db_lighthouse_01:0 "Deniz feneri"
 building_db_lighthouse_01_desc:0 "$building_type_db_lighthouse_01_desc$"
 building_db_lighthouse_02:0 "Dev Sancaklar"
 building_db_lighthouse_02_desc:0 "Fenerin üzerine Dev Sancak koyarsak, Yelkenciler deniz fenerimizi uzak denizlerde bile tanıyabilecek."
 building_db_lighthouse_03:0 "Büyük Deniz Feneri"
 building_db_lighthouse_03_desc:0 "Fenerimiz yakın denizde seyreden denizciler tarafından çok iyi bilinmektedir. Deniz fenerinin kurulumunun ardından birçok gemi güvenli bir şekilde limanımıza geliyor."
 building_type_db_mercenary_camp_01:0 "Paralı Asker Kampı"
 building_type_db_mercenary_camp_01_desc:0 "#F Para için canlarından vazgeçmeye hazır insanların toplandığı bir yer.#!"
 building_db_mercenary_camp_01:0 "Paralı Asker Kampı"
 building_db_mercenary_camp_01_desc:0 "$building_type_db_mercenary_camp_01_desc$"
 building_db_mercenary_camp_02:0 "Genişletilmiş Paralı Asker Kampı"
 building_db_mercenary_camp_02_desc:0 "Diyardan gelen kanın kokusunu alan daha fazla Paralı Asker Kampta toplandı. Daha fazla paralı asker iş bulmak ve bir sonraki savaş için yerel dükkanlardan mal satın almak için yarışıyor. Tabii sarhoş paralı askerlerle yerel halk arasındaki kavga da arttı."
 building_type_db_things_01:0 "Şey"
 building_type_db_things_01_desc:0 "#F A Thing, erken Germen toplumunda, kanun konuşmacılarının başkanlık ettiği topluluğun özgür insanlarından oluşan bir yönetim meclisidir.
İskandinavya'nın Hıristiyanlık öncesi klan kültüründe, bir klanın üyeleri ölü ve sakatlanmış akrabalarına karşı verilen zararların intikamını almak zorundaydı. Sonuç olarak, kan davası genellikle Viking toplumunda kullanılan en yaygın çatışma çözümü biçimi olarak görülüyor. Bununla birlikte, Kuzey Germen kültürlerinde kabileler arası kavgaları azaltmak ve sosyal düzensizliği önlemek için kullanılan yapılar daha genel anlamda dengeleyici yapılardır. Çatışmaların çözümü, evlilik ittifakları, güç gösterisi, onur ve miras anlaşmaları için forumlar olarak Viking toplumunda önemli bir rol oynadılar.#!"
 building_db_things_01:0 "Şey"
 building_db_things_01_desc:0 "$building_type_db_things_01_desc$"
 building_db_things_02:0 "Kalıcı Şey"
 building_db_things_02_desc:0 "Tanrı, Şey'i yeniden düzenleyerek her zaman uygun tavsiyeyi alabildi."
 building_db_things_03:0 "Genişletilmiş Şey"
 building_db_things_03_desc:0 "Tanrı, Şey'i genişleterek daha fazla alanda profesyonel tavsiye alabildi."
 building_type_db_fair_01:0 "Adil"
 building_type_db_fair_01_desc:0 "#F Bir fuar, çeşitli eğlence veya ticari faaliyetler için insanların bir araya gelmesidir. Normalde bir fuarın özünde, öğleden sonradan birkaç haftaya kadar süren planlanmış zamanlarla geçici olması vardır.
Orta Çağ'da, birçok fuar geçici pazarlar olarak gelişti ve özellikle uzun mesafeli ve uluslararası ticaret için önemliydi; çünkü toptan tüccarlar bazen günlerce, satın alma veya satış yapmaları gereken kişilerle buluşacaklarından emin olabilecekleri fuarlara seyahat ederlerdi.#!"
 building_db_fair_01:0 "Küçük Fuar"
 building_db_fair_01_desc:0 "$building_type_db_fair_01_desc$"
 building_db_fair_02:0 "Adil"
 building_db_fair_02_desc:0 "$building_type_db_fair_01_desc$"
 building_db_fair_03:0 "Bölge Fuarı"
 building_db_fair_03_desc:0 "Fuarın Diyar'da düzenlenmesinden bu yana giderek daha fazla insan geliyor."
 building_db_fair_04:0 "Büyük Fuar"
 building_db_fair_04_desc:0 "Fuarın Diyar'da düzenlenmesinden bu yana giderek daha fazla insan geliyor. Panayırda görülecek ve yiyecek çeşitli şeyler var ve Diyar'a ait çeşitli eşyalar satılıyor."
 building_type_db_royal_cynagogue_01:0 "Kraliyet Sinagogu"
 building_type_db_royal_cynagogue_01_desc:0 "#F Kraliyet ailesinin ibadet etmek için ziyaret ettiği bir sinagog.#!"
 building_db_royal_cynagogue_01:0 "Kraliyet Sinagogu"
 building_db_royal_cynagogue_01_desc:0 "$building_type_db_royal_cynagogue_01_desc$"
 building_db_royal_cynagogue_02:0 "Genişletilmiş Kraliyet Sinagogu"
 building_db_royal_cynagogue_02_desc:0 "Sinagogun genişletilmesiyle daha fazla inanlının ziyaret etmesine izin verildi."
 building_db_royal_cynagogue_03:0 "Tevrat Ark"
 building_db_royal_cynagogue_03_desc:0 "Tevrat Sandığı, Tevrat rulolarının muhafaza edildiği bir kabindir. Bir sinagogdaki sandık neredeyse her zaman ona bakanların Kudüs'e bakacak şekilde konumlandırılmıştır."
 building_type_db_royal_hindu_01:0 "Kraliyet Mandiri"
 building_type_db_royal_hindu_01_desc:0 "#F Kraliyet ailesinin ibadet etmek için ziyaret ettiği bir Hindu Tapınağı.#!"
 building_db_royal_hindu_01:0 "Kraliyet Mandiri"
 building_db_royal_hindu_01_desc:0 "$building_type_db_royal_cynagogue_01_desc$"
 building_db_royal_hindu_02:0 "Calai"
 building_db_royal_hindu_02_desc:0 "Öğrencilerin Mandir'de Vedik yazıları öğrenebilecekleri Calai'yi kurun. Calai'de akademisyenler ve öğrenciler Sanskritçe ve Vedik yazıları okuyacak ve inceleyecekler."
 building_db_royal_hindu_03:0 "Hastane"
 building_db_royal_hindu_03_desc:0 "Mandir'de hastalara ve yoksullara tıbbi bakım sağlamak için bir hastane kuruldu."
 building_type_db_statue_ruler_01:0 "Kahraman Heykeli"
 building_type_db_statue_ruler_01_desc:0 "#F Efsanevi bir kahramanın onuruna yapılan bir heykeldir.#!"
 building_db_statue_ruler_01:0 "Kahraman Heykeli"
 building_db_statue_ruler_01_desc:0 "$building_type_db_statue_ruler_01_desc$"
 building_db_statue_ruler_02:0 "Altın Kaplama"
 building_db_statue_ruler_02_desc:0 "Heykelin altınla kaplanması ona biraz daha saygı göstermenin iyi bir yolu olabilir."
 building_db_statue_ruler_03:0 "Ek Heykeller"
 building_db_statue_ruler_03_desc:0 "Heykelin yanına küçük bir heykel eklerseniz şekli daha mükemmel olacaktır."
 building_type_db_menagerie_01:0 "Kraliyet Hayvanat Bahçesi"
 building_type_db_menagerie_01_desc:0 "#F Hayvanat bahçesi, genellikle egzotik olan ve sergilenmek üzere tutulan esaret altındaki hayvanlardan oluşan bir koleksiyondur. Bir hayvanat bahçesi çoğunlukla aristokrat veya kraliyet sarayıyla bağlantılıydı ve bir sarayın bahçesi veya parkında yer alıyordu. Bu aristokratlar güçlerini ve zenginliklerini göstermek istiyorlardı çünkü canlı ve aktif egzotik hayvanlar daha az yaygındı, elde edilmesi daha zor ve bakımı daha pahalıydı.#!"
 building_db_menagerie_01:0 "Kraliyet Hayvanat Bahçesi"
 building_db_menagerie_01_desc:0 "$building_type_db_menagerie_01_desc$"
 building_db_menagerie_02:0 "Genişletilmiş Kraliyet Hayvanat Bahçesi"
 building_db_menagerie_02_desc:0 "Hayvanat bahçesini genişleterek, hayvanat bahçesinde eskisinden daha fazla hayvan yetiştirilebilir. Artık daha fazla aristokrat zenginliğimizi ve gücümüzü kıskanacak. Ancak yerel rahipler vaaz etme lüksümüz hakkında açıkça vaaz vermeye başladılar."
 building_db_menagerie_03:0 "Egzotik Hayvanat Bahçesi"
 building_db_menagerie_03_desc:0 "Uzaklardaki egzotik hayvanları toplamaya devam etme çabalarımız sonunda meyvesini vermiş gibi görünüyor. Artık filler, develer, aslanlar, leoparlar ve beyaz geyikler gibi çeşitli egzotik hayvanları yönetiyoruz."
 building_type_db_rabbi_council_01:0 "Haham Konseyi"
 building_type_db_rabbi_council_01_desc:0 "#F Yahudilerin Kudüs'ten kovulmasının ardından Haham, Yahudilerin Tevrat'a uygun bir yaşam sürmesine öncülük etti. Tanınmış hahamların tavsiyelerini dinlemeye davet edilmesi, mahkememizin Tevrat'a uygun olarak doğru yönde ilerlemesine yardımcı olacaktır.#!"
 building_db_rabbi_council_01:0 "Haham Konseyi"
 building_db_rabbi_council_01_desc:0 "$building_type_db_rabbi_council_01_desc$"
 building_db_rabbi_council_02:0 "Daimi Haham Konseyi"
 building_db_rabbi_council_02_desc:0 "Lord, Konseyi yeniden düzenleyerek her zaman uygun tavsiyeler alabildi."
 building_db_rabbi_council_03:0 "Genişletilmiş Haham Konseyi"
 building_db_rabbi_council_03_desc:0 "Lord, Konseyi genişleterek daha fazla alanda profesyonel tavsiye alabildi."
