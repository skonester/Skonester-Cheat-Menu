 sarc_char_design.dyn.choice.event.t:1 "Hanedan Seçimi"
 sarc_char_design.dyn.choice.event.d:0 " Hanedan üyelerinizi öldürmek veya sadece bazılarının mirastan yoksun bırakılma özelliğini eklemek arasında seçim yapın.\n\n Bunlar, karakterinizin hükümdarın unvanlarını miras almasını sağlamak için yapılır.\n\n Onları öldürmek, sıfırdan yükselmek için neredeyse boş bir hanedana sahip olma hissi verirken, bazılarını mirastan yoksun bırakmak hanedanı büyük ölçüde bozulmadan bırakır.\n\n Çok oyunculu mod için, hanedan temizliğinin diğer oyuncuları etkilememesi için mirastan yoksun bırakma seçeneğini öneririm."
