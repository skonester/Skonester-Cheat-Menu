 sarc_char_design.1001.t:1 "Karakter Tasarımcısı İstemi"
 sarc_char_design.1001.desc.5:0 "Özel bir hükümdar tasarlamak ister misiniz? (UYARI: Yakın hanedanınızı öldürür veya onları mirastan yoksun bırakır ve oluşturma işlemini tamamladığınızda mevcut hükümdarınız ölür.) (Karakterinizin yaşını seçtikten sonra, karakteriniz tüm yetenekleri 5 olacak şekilde oluşturulur. Bu oluşturulan karakter, mevcut hükümdarınızın oğlu olarak atanır.)"
 sarc_char_design.1001.desc.10:0 "Özel bir hükümdar tasarlamak ister misiniz? (UYARI: Yakın hanedanınızı öldürür veya onları mirastan yoksun bırakır ve oluşturma işlemini tamamladığınızda mevcut hükümdarınız ölür.) (Karakterinizin yaşını seçtikten sonra, karakteriniz tüm yetenekleri 10 olacak şekilde oluşturulur. Bu oluşturulan karakter, mevcut hükümdarınızın oğlu olarak atanır.)"
