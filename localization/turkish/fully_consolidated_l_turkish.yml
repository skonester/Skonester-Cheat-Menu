 pcm_money_decision_title:0 "#Skonester:#! Diyarın Hazinesi"
 pcm_money_decision_desc:0 "Muazzam bir hazine çağırın ve size altın, takva ve şöhret gibi bir lütuf bahşedilsin."
 pcm_money_decision_tooltip:0 "Saltanatınıza güçle başlamak için büyük bir altın, dindarlık ve prestij biriktirin."
 pcm_money_decision_ct:0 "Kralların kasaları önümde dolup taşıyor!"
 pcm_subrealm_to_culture_decision_title:0 "#Skonester:#! Kültür Fermanı"
 pcm_subrealm_to_culture_decision_desc:0 "Tüm vasalların ve toprakların kendi efendilerinin kültürünü benimsemelerine dair bir ferman ilan edin."
 pcm_subrealm_to_culture_decision_tooltip:0 "Krallığınızı tek bir kültür altında birleştirin."
 pcm_subrealm_to_culture_decision_ct:0 "Bundan sonra âlem tek dil ve gelenekle konuşacaktır."
 pcm_convert_subrealm_to_religion_decision_title:0 "#Skonester:#! İnanç Fermanı"
 pcm_convert_subrealm_to_religion_decision_desc:0 "Vasallarınızın ve alt bölgenizin sizin inancınıza dönüştürülmesi için bir ferman ilan edin."
 pcm_convert_subrealm_to_religion_decision_tooltip:0 "Krallığınızı tek bir kutsal bayrak altında birleştirin."
 pcm_convert_subrealm_to_religion_decision_ct:0 "Gerçeğin ışığı yoldan çıkanların üzerine yağsın!"
 pcm_show_decision_title:0 "--=#Skonester:#! Gizli Fermanları Ortaya Çıkarın =--"
 pcm_show_decision_desc:0 "Tüm Skonester kararlarını açıklayın."
 pcm_show_decision_tooltip:0 ""
 pcm_show_decision_ct:0 "Öyleyse yazılsın, böylece bilinsin."
 pcm_hide_decision_title:0 "--=#Skonester:#! Fermanları Gizle =--"
 pcm_hide_decision_desc:0 "Skonester kararlarını gözlerden gizleyin."
 pcm_hide_decision_tooltip:0 ""
 pcm_hide_decision_ct:0 "Parşömenleri mühürleyin ve dilleri susturun."
 pcm_cure_pox_decision_title:0 "#Skonester:#! Acılardan Arınma"
 pcm_cure_pox_decision_desc:0 "Kararnameyle, tüm bedensel hastalıklar ve genel rahatsızlıklar diyardan uzaklaştırılacak."
 pcm_cure_pox_decision_tooltip:0 "Bedenin getirdiği sıkıntıların alanını temizleyin."
 pcm_cure_pox_decision_ct:0 "Şifacının şifalı otları ve kutsal yağları beni saflığa kavuşturuyor!"
 pcm_cure_all_decision_title:0 "#Skonester:#! Diyarın Her derde devası"
 pcm_cure_all_decision_desc:0 "Ülkedeki her türlü hastalığı iyileştirecek harika bir iksir ilan edildi."
 pcm_cure_all_decision_tooltip:0 "Ülkedeki tüm rahatsızlıkları ve salgınları iyileştirin."
 pcm_cure_all_decision_ct:0 "Sevinin! Halkımızın üzerinden hastalığın gölgesi kalkıyor."
 pcm_cure_inbred_decision_title:0 "#Skonester:#! Soyların Arındırılması"
 pcm_cure_inbred_decision_desc:0 "Mistik ayinler ve ilahi lütuflarla aleminizdeki lekeler temizlenir."
 pcm_cure_inbred_decision_tooltip:0 "Alemden tüm kötü huyları ve kusurları kaldırın."
 pcm_cure_inbred_decision_ct:0 "Topraklarımın kanı bir kez daha saf ve güçlü akıyor!"
 set_immortal_interaction:0 "Ölümsüzlüğü bahşet"
 set_immortal_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U]'ya yirmi beş kış boyunca sonsuza kadar korunan yüzüyle sonsuz yaşam verilecek."
 set_mortal_interaction:0 "Ölümsüzlüğü İptal Et"
 set_mortal_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] sonsuz yaşamın zincirlerinden kurtulacak. Belki de [alıcı.GetSheHe] mezarın geri kalanını özlüyor."
 set_super_interaction:0 "Örnek olarak meshedin"
 set_super_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] ölümlülerin çok ötesine geçecek: bilgelik, güç, doğurganlık, dinçlik, şöhret, zenginlik ve dehşet açısından eşsiz. Lordlar arasında gerçekten mükemmel bir örnek."
 set_unsuper_interaction:0 "Paragon'un Bereketlerini İptal Et"
 set_unsuper_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] tüm yüce hediyelerden mahrum kalacak. [recipient.GetSheHe|U] bu yükü çok ağır bulabilir."
 set_super_governor_interaction:0 "Komiserin Yetkisini Verin"
 set_super_governor_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U]'ya diyarların yönetiminde ustalık verilecek: daha fazla vergi, akıllı yönetim, salonların hızlı inşası, artan refah ve halkın iltiması."
 set_unsuper_governor_interaction:0 "Komiserin Görevinin İptali"
 set_unsuper_governor_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] yönetimin bu nimetlerini kaybedecek ve ölümcül sınırlamaya geri dönecek."
 set_super_general_interaction:0 "Savaş Lordu olarak kutsa"
 set_super_general_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] orduların rakipsiz bir komutanı olacak: yiğitlik, dövüş becerisi, strateji ve dayanıklılık açısından eşsiz; savaşta korkulur ve kuşatmada hızlıdır."
 set_unsuper_general_interaction:0 "Savaş Lordunun Kutsamasını İptal Et"
 set_unsuper_general_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] savaşta tüm ilahi iltifatlardan mahrum kalacak ve bir zamanlar [recipient.GetSheHe]'nin zafer kazandığı yerde bocalayabilir."
 set_all_in_one_interaction:0 "Örnek Olarak Taç"
 set_all_in_one_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] için tüm kutsamalar verildi: Paragon, Steward's Mandate ve Warlord's Bane, tek bir formda birleşti. Gerçekten Skonester'in gizemlerinin harikası."
 set_unall_in_one_interaction:0 "Ölümlü İstasyona Dönüş"
 set_unall_in_one_interaction_desc:0 "[recipient.GetShortUINameNoTooltip|U] tüm mükemmel örnek, kâhya ve savaş ağası yeteneklerini kaybedecek ve bir insan çocuğu olarak yeniden yürüyecek."
 trait_immortality:0 "Ölümsüz"
 trait_immortality_desc:0 "Bu karakter Kutsal Ölümsüzlük Hediyesinden pay almıştır. Yüzleri her zaman genç kalacak ve doğal ölümün pençesine karşı dayanıklı olacaklar."
 trait_immortality_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] Kutsal Ölümsüzlük Hediyesi ile kutsanmıştır. [ROOT.GetCharacter.GetSheHe|U] asla yirmi beş yıldan fazla yaşlanmayacak ve doğal ölüme teslim olmayacak."
 trait_super:0 "Örnek"
 trait_super_desc:0 "Bu karakter, ölümlüler arasında mükemmel bir örnektir; benzersiz nitelikleri, gücü, çekiciliği ve [ROOT.GetCharacter.GetHerHim]'i diğerlerinden üstün kılan becerileri taşır."
 trait_super_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] bir örnek olarak yüceltildi, sınırsız güç, zeka ve şöhretle donatıldı."
 trait_super_governor:0 "Harikalar Komiseri"
 trait_super_governor_desc:0 "Bu karakter neredeyse ilahi bilgelikle yönetir. Toprakları zenginleşiyor, kasabaları gelişiyor ve sanki cennetin eli değmiş gibi düzen hüküm sürüyor."
 trait_super_governor_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip]'in kuralı altında, bölge gelişir, tarlalar çiçek açar ve en alttaki köylü bile kahyasının adını kutsar."
 trait_super_general:0 "Savaş Lordu Meshedildi"
 trait_super_general_desc:0 "Bu karakter, sanki kaderin eliyle yönlendiriliyormuşçasına ordulara liderlik eder. Ev sahipleri sarsılmaz bir cesaretle savaşıyor ve zafer üstüne zafer kazanıyor."
 trait_super_general_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip] eşsiz bir dehayla komuta eder, düşmanların korktuğu ve askerlerin saygı duyduğu, her ordunun zafere ulaşmasını sağlar."
 trait_savant_intrig:0 "Savant (Entrika)"
 trait_savant_intrig_desc:0 "Bu karakter, diğer sosyal veya entelektüel alanlardaki önemli bozulmalara rağmen, hile sanatlarında olağanüstü, takıntılı bir yetenek sergiliyor."
 trait_savant_learn:0 "Savant (Öğrenme)"
 trait_savant_learn_desc:0 "Bu karakter, diğer sosyal veya entelektüel alanlardaki ciddi bozulmaya rağmen bilim ve teolojide olağanüstü, takıntılı bir yetenek sergiliyor."
 trait_savant_mat:0 "Savant (Dövüş)"
 trait_savant_mat_desc:0 "Bu karakter, diğer sosyal veya entelektüel alanlardaki önemli bozulmaya rağmen, strateji ve dövüşte olağanüstü, takıntılı bir yetenek sergiliyor."
 trait_savant_stew:0 "Savant (Yönetim)"
 trait_savant_stew_desc:0 "Bu karakter, diğer sosyal veya entelektüel alanlardaki önemli bozulmaya rağmen, yönetim ve finans alanlarında olağanüstü, takıntılı bir yetenek sergiliyor."
 trait_savant_diplo:0 "Savant (Diplomasi)"
 trait_savant_diplo_desc:0 "Bu karakter, diğer sosyal veya entelektüel alanlardaki önemli bozulmaya rağmen, dillerde ve protokollerde olağanüstü, takıntılı bir yetenek sergiliyor."
