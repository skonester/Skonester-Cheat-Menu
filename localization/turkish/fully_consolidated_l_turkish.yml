 ### From: event_localization\water_of_life_events_l_english.yml
 water_of_life_header:0 "Yüzbaşının Günlüğü:"
 water_of_life.1001.t:0 "$water_of_life_header$ The Man Who Did Not Die."
 water_of_life.1001.desc:0 "Parşömen bir kütüphanede değil, Yahudiye'de bulunan paslı bir gladiusun kabzasının içine saklanmıştı. Latince kaba, askeriydi; Clavius adında bir Tribün'ün raporuydu. Mühürlü bir mezardan kaybolan bir cesetten, gerçeği bilen kızıl saçlı bir kadından ve yaşamın saatini durduran bir kupadan bahsediyor.\n\nSon giriş bir tarih değil, bir yemin: #'Ölemeyecek olanı öldüremem. Sadece ona hizmet edebilirim. Gözetlemek için ıssızlığa gidiyorum.'#!\n\nEfsaneler onun hala orada olduğunu söylüyor. Yardım bekleyen bir asker. Onu bulursam, Kaseyi de bulurum."
 water_of_life.1001.a:0 "Tribün bekliyor. Onu bulacağım."
 water_of_life.1001.b:0 "Bir Roma askerini avlamak için hazırlıklı olunmalı."
 water_of_life_header_1:0 "Takip:"
 water_of_life.1002.t:1 "$water_of_life_header_1$ Shadow of the Eagle."
 water_of_life.1002.desc:0 "Tacımı geride bırakıyorum. Clavius'u bulmak için sürgün yolunda yürümeliyim. Kadifemi yünle, asamı yürüyüş sopasıyla değiştiriyorum. Günlüğündeki ipuçları, insanların şehirlerinden uzaklaşıp İmparatorluğun erişiminin çöktüğü sessiz yerlere doğru gidiyor. İzlerini kapatmak için asırları olan bir hayaleti takip ediyorum."
 water_of_life.1002.a:0 "Yol uzun, ama iradem demirden."
 water_of_life.1002.b:0 "Diyarıma son bir bakış, sonra kayboluyorum."
 water_of_life_header_2:0 "Yaban Hayat:"
 water_of_life.1003.t:1 "$water_of_life_header_2$ The Seven Powers."
 water_of_life.1003.desc:0 "Yaban hayat bir [ROOT.Char.GetWomanMan] kemiğine kadar soyar. *Meryem İncili* uyardığı gibi, ruh Öfkenin Yedi Gücü tarafından kuşatılmıştır: Karanlık, Arzu ve Cehalet. Ateş başında yalnızken onlarla savaşıyorum. Haydutlardan korkmuyorum; Clavius'un Tanrısını bulduğu sessizlikten korkuyorum. Zihnim—*Nous*—taş yuvarlanmadan önce bir mezar kadar hareketsizleşmeli."
 water_of_life.1003.a:0 "Geri dönme isteğini yeniyorum."
 water_of_life_header_3:0 "Dayanıklılık Testi:"
 water_of_life.1004.t:1 "$water_of_life_header_3$ The Soldier's Ration."
 water_of_life.1004.desc:0 "Erzağım azalıyor. Manzara acımasız kaya ve dikenlerden ibaret. Şimdi neden burayı seçtiğini anlıyorum: doğadan yapılmış bir kale. Açlık karnımı kemiriyor. Bir lord gibi mi avlanmalıyım, yoksa bir hacı gibi mi dilenmeliyim? Tribün disipline saygı duyardı ama Mecdelli Meryem alçakgönüllülüğü öğretti."
 water_of_life.1004.a:0 "Avlanacağım. Disiplin bedeni ayakta tutar."
 water_of_life.1004.b:0 "Yerlileri arayacağım. Alçakgönüllülük ruhu ayakta tutar."
 water_of_life_header_4:0 "Av:"
 water_of_life.1005.t:1 "$water_of_life_header_4$ Signs of the Legion."
 water_of_life.1005.desc:0 "Bir işaret buluyorum; askeri bir hassasiyetle dizilmiş bir taş yığını. Sonra bir tane daha. Başıboş dolaşmıyorum; yönlendiriliyorum. Ya da belki... sürülüyorum. Bir derenin yanında bir geyik görüyorum. Kaçmıyor. Güçlü bir koruyucunun himayesindeymiş gibi korkusuzca beni izliyor. Ateş etmiyorum. Burada öldürmek bir Ateşkesin ihlali gibi hissettiriyor."
 water_of_life.1005.a:0 "Yayımı indiriyorum. Burada bir misafirim."
 water_of_life_header_5:0 "Köy:"
 water_of_life.1006.t:1 "$water_of_life_header_5$ The Old Man of the Hills."
 water_of_life.1006.desc:0 "Dağ yamacına tutunmuş küçük bir mezra. Romalıyı sorduğumda, köylüler balık işareti yapıyorlar. Bir yaşlı fısıldıyor: 'Yabancı mı? Büyükbabamın büyükbabasından beri burada. Eski dünyanın demirlerini giyiyor. Bizi kurtlardan ve haydutlardan koruyor ama hiç konuşmuyor. Birini bekliyor.' Yaşlı bana bakıyor. 'Belki de seni.'"
 water_of_life.1006.a:0 "Geleceğimi biliyor."
 water_of_life_header_6:0 "Yaklaşım:"
 water_of_life.1007.t:1 "$water_of_life_header_6$ The Tenth Legion."
 water_of_life.1007.desc:0 "Yol, kadim taşlarla tahkim edilmiş bir mağara ağzına çıkan bir keçi yoluna daralıyor. Üzerimde gözler hissediyorum; imparatorlukların yükselişini ve toza dönüşünü izlemiş bir bakışın ağırlığı. Duruyorum ve boş ellerimi kaldırıyorum. 'Tribün!' diye sesleniyorum. 'Diri Olanı arıyorum!' \n\nSessizlik cevap veriyor. Sonra, taşın sürtünme sesi."
 water_of_life.1007.a:0 "Aslanın inine gir."
 water_of_life_header_8:0 "Tribün:"
 water_of_life.1008.t:1 "$water_of_life_header_8$ Clavius Aquila."
 water_of_life.1008.desc:0 "Basit bir ateşin yanında oturmuş, hala yeni gibi parlayan bir gladiusu temizliyor. Derisi eonlarca pürüzsüzleşmiş olsa da, bir Roma Tribünü tuniği giyiyor. Clavius başını kaldırıyor, gözleri bin yıllık hatıranın ağırlığıyla dolu.\n\n'Uzlaştırılamayacak iki şey gördüm,' diyor sesi çakıl taşı gibi. 'Tartışmasız ölmüş bir adam ve aynı adamın tekrar dirilişi. Meryem'e, layık bir varis gelene kadar nöbet tutacağıma söz verdim.'\n\nAteşin derinliklerine bakıyor. 'Birçok krala danışmanlık yaptım. Cüzzamlı Kral Baldwin, #P *'Yahudiye veya Müslümana kötü davranmayın. Bu Krallıkta ırk yoktur, sadece Tanrı'nın tebaası vardır.'*#! emrini verdiğinde onun yanındaydım. Şimdi bu adaleti sen taşımalısın.'\n\nYüzyıllar boyunca mücevherlerle kaplanmış basit bir kil kupayı uzatıyor. 'İncil* der ki: *Madde, eşi benzeri olmayan bir tutku doğurdu.* İç, ve tutku ölsün. Sadece görev kalsın. Nöbetimi devralmaya hazır mısın, [ROOT.GetCharacter.GetTitledFirstNameNoTooltip]?'"
 water_of_life.1008.a:0 "'Seni azat ediyorum Tribün. Huzura kavuş.'"
 water_of_life_header_9:0 "Dönüş:"
 water_of_life.1009.t:1 "$water_of_life_header_9$ The New Sentinel."
 water_of_life.1009.desc:0 "Kupa dudaklarıma değdiği an Clavius toza dönüştü; sonunda huzura erdi. Onun yükünü ve O'nun kanını taşıyarak diyarıma dönüyorum. Tebaa tezahürat yapıyor ama anlamıyorlar. Onlar bir hükümdar görüyorlar; ben ise etin geçici doğasını.\n\n[one_loyal_subject_character.GetFirstNameNoTooltip]: [ROOT.Char.GetLadyLord], döndünüz! \n\n[second_loyal_subject_character.GetFirstNameNoTooltip]: Yabanda kaybolduğunuzdan korkmuştuk! \n\n[third_loyal_subject_character.GetFirstNameNoTooltip]: Görünüşünüz... korkutucu derecede sakin. \n\n[fourth_loyal_subject_character.GetFirstNameNoTooltip]: Evine hoş geldin, Muhafız."
 water_of_life.1009.a:0 "Bir Daha Asla Eskisi Gibi Olamam."
