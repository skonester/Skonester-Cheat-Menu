 ### From: auto_marriage_l_english.yml
 males_marry:0 "Hanedanı/Haneyi Erkek Evlilikleri için İşaretle"
 males_marry_desc:0 "Uygun erkekler, maksimum eş sayısına ulaşana kadar yılda bir kez evlendirilecektir. Standart (ataerkil) evlilikler olarak düzenlenir."
 females_marry:0 "Hanedanı/Haneyi Kadın Evlilikleri için İşaretle"
 females_marry_desc:0 "Uygun kadınlar, maksimum eş sayısına ulaşana kadar yılda bir kez evlendirilecektir. Soylarını korumak için anaerkil evlilikler olarak düzenlenir."
 inbreed_marry:0 "Yakın Akraba Evliliklerini Etkinleştir"
 inbreed_marry_desc:0 "İşaretli hanedanların veya hanelerin akrabaları mümkün olduğunda birbirleriyle evlendirilecektir. Sistem, dini kuralları takip ederek üvey kardeşler, kuzenler veya amca/hala-yeğen eşleşmelerini tercih eder ve safkan yavruları hedefler."
 males_concubine:0 "Erkeklere Cariye Ata"
 males_concubine_desc:0 "İşaretli hanedanlardan veya hanelerden uygun erkeklere, inanç ve yasaların izin verdiği sınıra kadar cariye atanacaktır."
 females_concubine:0 "Kadınlara Cariye Ata"
 females_concubine_desc:0 "İşaretli hanedanlardan veya hanelerden uygun kadınlara, dini ve kültürel sınırlara saygı duyarak izin verilen maksimum sayıya kadar cariye atanacaktır."
 dynasty_marry:0 "Tüm Hanedanı İşaretle"
 dynasty_marry_desc:0 "Tüm bir hanedanı işaretler; böylece üyeleri ayarlananlara bağlı olarak otomatik olarak evlendirilir, cariye verilir veya öjeni kurallarına tabi tutulur. Görünür bir hanedan değiştiricisi bu durumu takip eder."
 house_marry:0 "Tüm Haneyi İşaretle"
 house_marry_desc:0 "Bir hanedan içindeki tek bir haneyi otomatik evlilik ve cariyelik kuralları için işaretler. Bir hane değiştiricisi haneyi işaretli olarak tanımlayacaktır."
 individual_marry_exempt:0 "Bir Bireyi Muaf Tut"
 individual_marry_exempt_desc:0 "Bir karakteri otomatik evlilik veya cariyelik düzenlemelerinden atlanması için işaretler. Bir değiştirici onları muaf olarak tanımlar."
 males_marry_dynasty:0 "Evlendirilecek Hanedan Erkekleri"
 males_marry_dynasty_desc:0 "Bu hanedanın erkekleri, sistem tarafından yılda bir kez otomatik olarak evlendirilir."
 females_marry_dynasty:0 "Evlendirilecek Hanedan Kadınları"
 females_marry_dynasty_desc:0 "Bu hanedanın kadınları, yılda bir kez otomatik olarak anaerkil evliliklerle evlendirilir."
 inbreed_marry_dynasty:0 "Akrabalıkla Bağlı Hanedan"
 inbreed_marry_dynasty_desc:0 "Bu hanedan, üyeleri arasında kardeşler, kuzenler veya amcalar/halalar ile yeğenler arasındaki birlikleri tercih ederek yakın akraba evliliklerini teşvik eder."
 males_concubine_dynasty:0 "Cariyeli Hanedan Erkekleri"
 males_concubine_dynasty_desc:0 "Bu hanedanın erkeklerine inanç ve yasalara uygun olarak otomatik olarak cariye verilecektir."
 females_concubine_dynasty:0 "Cariyeli Hanedan Kadınları"
 females_concubine_dynasty_desc:0 "Bu hanedanın kadınlarına inanç ve geleneklerin izin verdiği şekilde otomatik olarak cariye verilecektir."
 males_marry_house:0 "Evlendirilecek Hane Erkekleri"
 males_marry_house_desc:0 "Bu hanenin erkekleri yılda bir kez otomatik olarak evlendirilir."
 females_marry_house:0 "Evlendirilecek Hane Kadınları"
 females_marry_house_desc:0 "Bu hanenin kadınları yılda bir kez otomatik olarak anaerkil evliliklerle evlendirilir."
 inbreed_marry_house:0 "Hane Akraba Evliliği Uyguluyor"
 inbreed_marry_house_desc:0 "Bu hane, soyları güçlendiren birliklere öncelik vererek üyeleri arasında yakın akraba evlilikleri düzenler."
 males_concubine_house:0 "Cariyeli Hane Erkekleri"
 males_concubine_house_desc:0 "Bu hanenin erkeklerine otomatik olarak cariye atanacaktır."
 females_concubine_house:0 "Cariyeli Hane Kadınları"
 females_concubine_house_desc:0 "Bu hanenin kadınlarına geleneklerin izin verdiği şekilde otomatik olarak cariye atanacaktır."
 males_eugenic:0 "Erkek Öjeni Evlilikleri"
 males_eugenic_desc:0 "İşaretli hanedanların veya hanelerin uygun erkekleri, genetik olarak arzu edilen birliklere öncelik verilerek, saf ve güçlü soylara meyilli evliliklerle evlendirilecektir."
 females_eugenic:0 "Kadın Öjeni Evlilikleri"
 females_eugenic_desc:0 "İşaretli hanedanların veya hanelerin uygun kadınları, soyları korumak veya güçlendirmek için (mümkünse anaerkil olarak) evlendirilecektir."
 males_eugenic_dynasty:0 "Hanedan Erkek Öjeni Hedefliyor"
 males_eugenic_dynasty_desc:0 "Bu hanedan, erkekleri için güçlü, safkan torunlar üretme niyetiyle evlilikler düzenler."
 females_eugenic_dynasty:0 "Hanedan Kadın Öjeni Hedefliyor"
 females_eugenic_dynasty_desc:0 "Bu hanedan, kadınları için güçlü, safkan torunlar üretme niyetiyle evlilikler düzenler."
 males_eugenic_house:0 "Hane Erkek Öjeni Hedefliyor"
 males_eugenic_house_desc:0 "Bu hane, erkekleri için soy saflığı ve gücü peşinde evlilikler düzenler."
 females_eugenic_house:0 "Hane Kadın Öjeni Hedefliyor"
 females_eugenic_house_desc:0 "Bu hane, kadınları için soy saflığı ve gücü peşinde evlilikler düzenler."
