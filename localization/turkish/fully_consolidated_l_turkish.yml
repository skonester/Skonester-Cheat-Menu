 trait_100_stat_man_character_desc:0 "[ROOT.GetCharacter.GetFirstNameNoTooltip], Barbara'nın seçilmişi olarak yürür; efsaneler arasında bir efsane ve durdurulamaz bir gücün taşıyıcısıdır."
