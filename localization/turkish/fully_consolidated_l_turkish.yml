 start_searching_for_water_of_life_decision:0 "Ölümsüz Bir Gün"
 start_searching_for_water_of_life_decision_tooltip:1 "Clavius ​​aradığı huzuru Roma'da değil, Meryem'in#E Nous#! 'unda buldu. Onların soyunu sonsuza kadar güvence altına alıyor."
 start_searching_for_water_of_life_decision_desc:0 "#F 'Birbirlerine uymayan iki şey gördüm: Sorgusuz sualsiz ölen bir adam ve aynı adamın yeniden hayatta olması.'#!
Tribün Clavius ​​Aquila, Roma'nın çılgınlığından kaçtığında, diğerlerinin reddettiği kişinin peşinden gitti. *Meryem İncili'nin* kaydettiği gibi, Petrus ona şöyle meydan okudu: 'Gerçekten bizim bilgimiz dışında bir kadınla mı konuştu?' Fakat Levi cevap verdi: 'Eğer Kurtarıcı onu layık kıldıysa, sen kim oluyorsun da onu reddediyorsun?'
Clavius ​​bu değerliliğin kılıcı oldu. Roma kili gibi kırmızıya boyanmış saçlarıyla gizlenen Mary'yi ve onların gizli çocuklarını korumak için Kupa'dan içti. O, onun öğrettiği gerçeği koruyarak, maddenin çözünmesine karşı bir dayanak noktası oldu: #'İnsanoğlu içinizdedir. O'nun peşinden gidin!'#!
#P Tribün asla ölmedi. O, Gnosis'in ebedi nöbetçisi olarak yeryüzünde hareketsizce yürür.#!
#X#bold ~ ONUNCU'NUN TRİBÜNÜ, SESSİZLİĞİN BEKÇİSİ ~
~ 'ONU BİZDEN DAHA ÇOK SEVDİ' ~
~ YENİDEN DOĞAN BARBARA, YÜKSELECEK ~#!#!"
 start_searching_for_water_of_life_decision_start:0 "#Y#bold *'Barış sizinle olsun. Huzurumu kendi içinizde edinin.'#!"
 start_searching_for_water_of_life_decision_proceed:0 "Mezarın üzerindeki mühür kırıldı ve ölüm de öyle. Clavius, sevgili Meryem'in#E Nous#! (Zihin)'ini taşıyan soyunu bekleyerek gölgelerde kalıyor. Barbara#!—Magdalene yeniden doğmuş#P Hattına katılmayı kabul edin.#Z Tribün Koruması#! ve#E Kazanın, Kâse#!üzerinde hak iddia edin, ancak Ortodoksların kıskançlığına dikkat edin."
 start_searching_for_water_of_life_decision_stress:0 "Meryem şunu öğretti: 'Zihnin olduğu yerde hazine de vardır.' Ancak Clavius, Sessizlik'te dinlenmek için yükselirken yüzyıllarca bedende oyalandı. Bu ayrılığa katlanabilir miyim?"
 start_searching_for_water_of_life_decision_stress_lazy:0 "#N 'Kendinizi koruyun ki kimse sizi yoldan çıkarmasın.' Bir Muhafız uyuyamaz. [GetTrait('lazy').GetName( GetPlayer )] ile,#! içinde#E İnsanoğlu'nu aramak için gereken disiplin toza dönüşüyor.#!"
 start_searching_for_water_of_life_decision_confirm:0 "Tüm doğalar köklerine kadar çözümlenmiştir."
