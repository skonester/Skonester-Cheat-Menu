building_type_db_things_01_desc:0 "#F A Thing, erken Germen toplumunda, kanun konuşmacılarının başkanlık ettiği topluluğun özgür insanlarından oluşan bir yönetim meclisidir.
İskandinavya'nın Hıristiyanlık öncesi klan kültüründe, bir klanın üyeleri ölü ve sakatlanmış akrabalarına karşı verilen zararların intikamını almak zorundaydı. Sonuç olarak, kan davası genellikle Viking toplumunda kullanılan en yaygın çatışma çözümü biçimi olarak görülüyor. Bununla birlikte, Kuzey Germen kültürlerinde kabileler arası kavgaları azaltmak ve sosyal düzensizliği önlemek için kullanılan yapılar daha genel anlamda dengeleyici yapılardır. Çatışmaların çözümü, evlilik ittifakları, güç gösterisi, onur ve miras anlaşmaları için forumlar olarak Viking toplumunda önemli bir rol oynadılar.#!"
building_type_db_fair_01_desc:0 "#F Bir fuar, çeşitli eğlence veya ticari faaliyetler için insanların bir araya gelmesidir. Normalde bir fuarın özünde, öğleden sonradan birkaç haftaya kadar süren planlanmış zamanlarla geçici olması vardır.
Orta Çağ'da, birçok fuar geçici pazarlar olarak gelişti ve özellikle uzun mesafeli ve uluslararası ticaret için önemliydi; çünkü toptan tüccarlar bazen günlerce, satın alma veya satış yapmaları gereken kişilerle buluşacaklarından emin olabilecekleri fuarlara seyahat ederlerdi.#!"
  dp_information.useful_tips.d:0 "Özellik Menüsü
- Eklemek için bir kez tıklayın, kaldırmak için tekrar tıklayın.
- Bir özellik görünmüyorsa bu, modun bozuk olduğu anlamına gelmez; Paradox'tan gelen sabit kodlu bir geçersiz kılmayı gösterebilir.
- DLC faktörleri nedeniyle bazı etkileşimler belirli karakterlerde görünmeyebilir.
- Şövalyekan özellikleri, rastgele NPC'nin ilginç istatistiklerini vermek için yeni oyun başlangıcında küçük dozlarda rastgele eklenir. İnsanlar buna ısınmazsa çıkaracağım.
- Bu mod, sürüm düşürmeniz gerekiyorsa oyunun eski sürümlerini de destekleyecektir."
