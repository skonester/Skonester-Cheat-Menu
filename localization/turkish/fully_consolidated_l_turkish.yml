 dp_information.changelog.t:0 "Boğa Burcu Sezonu Değişiklik Günlüğü"
 dp_information.changelog.d:0 "Boğa v1.1: 1.19.0.4 "Karakter menüsünü düzenlemek için çoğu eksik din/kültür eklendi"
 dp_information.useful_tips.t:0 "Yararlı İpuçları"
 dp_information.useful_tips.d:0 "Özellik Menüsü
- Eklemek için bir kez tıklayın, kaldırmak için tekrar tıklayın.
- Bir özellik görünmüyorsa bu, modun bozuk olduğu anlamına gelmez; Paradox'tan gelen sabit kodlu bir geçersiz kılmayı gösterebilir.
- DLC faktörleri nedeniyle bazı etkileşimler belirli karakterlerde görünmeyebilir.
- Şövalyekan özellikleri, rastgele NPC'nin ilginç istatistiklerini vermek için yeni oyun başlangıcında küçük dozlarda rastgele eklenir. İnsanlar buna ısınmazsa çıkaracağım.
- Bu mod, sürüm düşürmeniz gerekiyorsa oyunun eski sürümlerini de destekleyecektir."
 dp_information.locations.t:0 "Özel Teşekkür"
  dp_information.locations.d:0 "\n- To DaddyPika and Zhuge. Also some dead code I modified from Pavel,Bone,Leech,Sol,Xorxidox,Gravity,x4077.RIP to Kurthakon. If I forgot to credit someone let me know on Nexus. If you like the mod, send donations to fungaming on ko-fi.com who is currently battling health issues.
