 sarc_char_design.skill.event.d.5:0 "Değerini değiştirmek için bir yetenek seçin. Özel karakterdeki tüm yetenekler 5 ile başlar. Yetenek değişiklikleri ancak bir gün geçtikten sonra görünür, ancak doğru miktar için karakter ekranındaki istatistik puanının üzerine gelebilirsiniz."
