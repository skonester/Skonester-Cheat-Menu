 X_temple_confirm:0 "Zemini kutsayın."
 X_castle_title:0 "Kale ile Tahkim Et"
 X_castle_desc:0 "Bir lordun yönetimini taş duvarlardan daha hızlı hiçbir şey güvenceye alamaz. Bir kule yükselecek, güç kalesi ve hanemin makamı olacak."
 X_castle_confirm:0 "Kaleyi yükseltin."
 X_unify_title:0 "Diyarı İnanç ve Gelenekte Birleştir"
 X_unify_desc:0 "Vasallarım dil ve inanç bakımından çeşitlidir, gelenek ve duada bölünmüşlerdir. Yine de tek bir sancak altında kan ve ruh bütünleşecektir."
